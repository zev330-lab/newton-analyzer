<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F1A2E">
<title>Newton MA — Investment Analyzer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;font-family:'Inter',system-ui,sans-serif}
body{background:#0F1A2E;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes rotatePhone{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
.fade-in{animation:fadeIn .3s ease-out}
.slide-in{animation:slideIn .4s ease-out}
.detail-modal{position:fixed;inset:0;z-index:50;background:rgba(15,26,46,.8);backdrop-filter:blur(6px);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px}
@media(min-width:1024px){.detail-modal{padding:24px;display:flex;align-items:flex-start;justify-content:center}}
.scrollbar-thin::-webkit-scrollbar{width:6px}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent}
.scrollbar-thin::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.range-input{-webkit-appearance:none;appearance:none;width:100%;height:24px;background:transparent;cursor:pointer;margin:0;position:relative;z-index:2}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:#D4A843;border:3px solid white;box-shadow:0 1px 6px rgba(0,0,0,.25);cursor:pointer;margin-top:-8px}
.range-input::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:transparent}
.range-input::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#D4A843;border:3px solid white;box-shadow:0 1px 6px rgba(0,0,0,.25);cursor:pointer}
.range-input::-moz-range-track{height:6px;border-radius:3px;background:transparent}
.addr-cell{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(min-width:768px){.addr-cell{max-width:180px}}
@media(min-width:1024px){.addr-cell{max-width:240px}}
@media(orientation:landscape) and (max-width:1023px){
  .data-table th,.data-table td{padding:2px 4px;white-space:nowrap}
  .data-table{font-size:11px}
  .dash-cards{display:none!important}
  .app-header{padding-top:6px!important;padding-bottom:6px!important}
  .app-header h1{font-size:14px!important}
  .app-header p{display:none}
  .app-footer{display:none}
}
@media(min-width:1024px){
  .data-table th,.data-table td{padding:6px 8px}
  .data-table{font-size:13px}
}
@media print{.no-print{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{navy:{DEFAULT:'#1B2A4A',dark:'#0F1A2E',light:'#2C3E6B'},gold:{DEFAULT:'#D4A843',light:'#E8C97A'}}}}}</script>
<script src="data.js"></script>
<script src="app.js?v=2.3"></script>
</body>
</html>
